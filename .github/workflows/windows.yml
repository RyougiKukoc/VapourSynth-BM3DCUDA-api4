name: Build Windows CPU/RTC

on:
  push:
    branches:
      - main
      - master
    tags:
      - cpu
      - cu121
      - cu129
    paths:
      - "CMakeLists.txt"
      - "cpu_source/**"
      - "hatch_build.py"
      - "pyproject.toml"
      - "rtc_source/**"
      - "tools/**"
      - ".github/workflows/windows.yml"
  pull_request:
    paths:
      - "CMakeLists.txt"
      - "cpu_source/**"
      - "hatch_build.py"
      - "pyproject.toml"
      - "rtc_source/**"
      - "tools/**"
      - ".github/workflows/windows.yml"
  workflow_dispatch:
    inputs:
      variant:
        description: "Package variant to build"
        default: "cpu"
        type: choice
        options:
          - cpu
          - cu121
          - cu129
      upload_release:
        description: "Upload artifacts to the matching release tag"
        default: false
        type: boolean
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ github.event.inputs.variant || github.ref_name }}
    runs-on: windows-2025

    defaults:
      run:
        shell: cmd

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select variant
        shell: powershell
        run: |
          $variant = "${{ github.event.inputs.variant }}"
          if (-not $variant) {
            if ("${{ github.ref_name }}" -in @("cpu", "cu121", "cu129")) {
              $variant = "${{ github.ref_name }}"
            } elseif ("${{ github.event.release.tag_name }}" -in @("cpu", "cu121", "cu129")) {
              $variant = "${{ github.event.release.tag_name }}"
            } else {
              $variant = "cpu"
            }
          }
          if ($variant -notin @("cpu", "cu121", "cu129")) {
            throw "Unsupported BM3DCUDA variant: $variant"
          }
          "BM3DCUDA_VARIANT=$variant" | Out-File -FilePath $env:GITHUB_ENV -Append
          "BM3DCUDA_CUDA_VARIANT=$variant" | Out-File -FilePath $env:GITHUB_ENV -Append
          "BM3DCUDA_ASSET=bm3dcuda-$variant-win64.zip" | Out-File -FilePath $env:GITHUB_ENV -Append
          if ($variant -eq "cu121") {
            "BM3DCUDA_CUDA_VERSION=12.1.1" | Out-File -FilePath $env:GITHUB_ENV -Append
            "BM3DCUDA_CUDART_VERSION=12.1.105" | Out-File -FilePath $env:GITHUB_ENV -Append
            "BM3DCUDA_NVRTC_VERSION=12.1.105" | Out-File -FilePath $env:GITHUB_ENV -Append
            "BM3DCUDA_NVCC_VERSION=12.1.105" | Out-File -FilePath $env:GITHUB_ENV -Append
            "BM3DCUDA_NVJITLINK_VERSION=12.1.105" | Out-File -FilePath $env:GITHUB_ENV -Append
            "BM3DCUDA_EXTRA_CUDA_PACKAGES=" | Out-File -FilePath $env:GITHUB_ENV -Append
          } elseif ($variant -eq "cu129") {
            "BM3DCUDA_CUDA_VERSION=12.9.1" | Out-File -FilePath $env:GITHUB_ENV -Append
            "BM3DCUDA_CUDART_VERSION=12.9.79" | Out-File -FilePath $env:GITHUB_ENV -Append
            "BM3DCUDA_NVRTC_VERSION=12.9.86" | Out-File -FilePath $env:GITHUB_ENV -Append
            "BM3DCUDA_NVCC_VERSION=12.9.86" | Out-File -FilePath $env:GITHUB_ENV -Append
            "BM3DCUDA_NVJITLINK_VERSION=12.9.86" | Out-File -FilePath $env:GITHUB_ENV -Append
            "BM3DCUDA_EXTRA_CUDA_PACKAGES=libnvfatbin=12.9.82 libnvfatbin-dev=12.9.82 libnvfatbin-static=12.9.82" | Out-File -FilePath $env:GITHUB_ENV -Append
          }
          Write-Host "Selected BM3DCUDA variant: $variant"

      - name: Set up CPython
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python build tools
        run: >-
          "%pythonLocation%\python.exe" -m pip install --upgrade pip build hatchling packaging cmake ninja

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install CUDA static packages
        if: env.BM3DCUDA_VARIANT != 'cpu'
        id: cuda
        uses: mamba-org/setup-micromamba@v3
        with:
          environment-name: cuda-${{ env.BM3DCUDA_VARIANT }}
          init-shell: none
          cache-downloads: true
          post-cleanup: environment
          condarc: |
            channels:
              - conda-forge
            channel_priority: strict
          create-args: >-
            cuda-cudart-dev=${{ env.BM3DCUDA_CUDART_VERSION }}
            cuda-nvrtc=${{ env.BM3DCUDA_NVRTC_VERSION }}
            cuda-nvrtc-dev=${{ env.BM3DCUDA_NVRTC_VERSION }}
            cuda-nvrtc-static=${{ env.BM3DCUDA_NVRTC_VERSION }}
            cuda-nvcc=${{ env.BM3DCUDA_NVCC_VERSION }}
            libnvjitlink=${{ env.BM3DCUDA_NVJITLINK_VERSION }}
            libnvjitlink-dev=${{ env.BM3DCUDA_NVJITLINK_VERSION }}
            libnvjitlink-static=${{ env.BM3DCUDA_NVJITLINK_VERSION }}
            ${{ env.BM3DCUDA_EXTRA_CUDA_PACKAGES }}

      - name: Show CUDA package layout
        if: env.BM3DCUDA_VARIANT != 'cpu'
        run: |
          set "CUDA_ROOT=${{ steps.cuda.outputs.environment-path }}\Library"
          echo CUDA_ROOT=%CUDA_ROOT%
          dir "%CUDA_ROOT%\include\nvrtc.h"
          dir "%CUDA_ROOT%\lib\cuda.lib"
          dir "%CUDA_ROOT%\lib\nvrtc_static.lib"
          dir "%CUDA_ROOT%\lib\nvrtc-builtins_static.lib"
          dir "%CUDA_ROOT%\lib\nvptxcompiler_static.lib"

      - name: Prepare VapourSynth R77 wheel
        run: >-
          "%pythonLocation%\python.exe" tools\ci_prepare_windows.py

      - name: Build package directory
        if: env.BM3DCUDA_VARIANT == 'cpu'
        run: >-
          "%pythonLocation%\python.exe" tools\ci_build_windows.py
          --clean
          --variant %BM3DCUDA_VARIANT%
          --dist-dir dist\windows-%BM3DCUDA_VARIANT%

      - name: Build CUDA RTC package directory
        if: env.BM3DCUDA_VARIANT != 'cpu'
        run: >-
          "%pythonLocation%\python.exe" tools\ci_build_windows.py
          --clean
          --variant %BM3DCUDA_VARIANT%
          --dist-dir dist\windows-%BM3DCUDA_VARIANT%
          --cuda-root "${{ steps.cuda.outputs.environment-path }}\Library"

      - name: Smoke-load explicit package
        if: env.BM3DCUDA_VARIANT == 'cpu'
        run: >-
          "%pythonLocation%\python.exe" tools\smoke_load_artifact.py
          --vapoursynth-root _deps\vapoursynth-wheel-R77
          --artifact-dir dist\windows-%BM3DCUDA_VARIANT%
          --exercise-cpu-filter

      - name: Smoke-load package through manifest autoload
        if: env.BM3DCUDA_VARIANT == 'cpu'
        run: >-
          "%pythonLocation%\python.exe" tools\smoke_load_artifact.py
          --vapoursynth-root _deps\vapoursynth-wheel-R77
          --artifact-dir dist\windows-%BM3DCUDA_VARIANT%
          --autoload
          --exercise-cpu-filter

      - name: Pack release zip
        run: >-
          "%pythonLocation%\python.exe" tools\package_plugin_zip.py
          --variant %BM3DCUDA_VARIANT%
          --input-dir dist\windows-%BM3DCUDA_VARIANT%
          --output dist\%BM3DCUDA_ASSET%

      - name: Download CPU release zip for CUDA wheel merge
        if: env.BM3DCUDA_VARIANT != 'cpu'
        shell: powershell
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          New-Item -ItemType Directory -Force dist\cpu-release | Out-Null
          gh release download cpu --pattern bm3dcuda-cpu-win64.zip --dir dist\cpu-release --repo $env:GITHUB_REPOSITORY

      - name: Build wheel from local prebuilt package
        env:
          BM3DCUDA_CPU_PREBUILT_URL: ${{ github.workspace }}\dist\bm3dcuda-cpu-win64.zip
          BM3DCUDA_CUDA_PREBUILT_URL: ${{ github.workspace }}\dist\${{ env.BM3DCUDA_ASSET }}
        run: |
          if "%BM3DCUDA_VARIANT%"=="cpu" (
            set "BM3DCUDA_CPU_PREBUILT_URL=%GITHUB_WORKSPACE%\dist\bm3dcuda-cpu-win64.zip"
          ) else (
            set "BM3DCUDA_CPU_PREBUILT_URL=%GITHUB_WORKSPACE%\dist\cpu-release\bm3dcuda-cpu-win64.zip"
            set "BM3DCUDA_CUDA_PREBUILT_URL=%GITHUB_WORKSPACE%\dist\%BM3DCUDA_ASSET%"
          )
          "%pythonLocation%\python.exe" -m build --wheel --no-isolation --outdir dist\wheels-%BM3DCUDA_VARIANT%

      - name: Install built wheel
        run: >-
          for %%I in (dist\wheels-%BM3DCUDA_VARIANT%\*.whl) do "%pythonLocation%\python.exe" -m pip install --force-reinstall "%%~fI"

      - name: Smoke test installed CPU wheel
        if: env.BM3DCUDA_VARIANT == 'cpu'
        run: >-
          "%pythonLocation%\python.exe" tools\smoke_installed_wheel.py --exercise-cpu-filter

      - name: Smoke test source install with prebuilt package
        if: env.BM3DCUDA_VARIANT == 'cpu'
        run: |
          set "BM3DCUDA_CPU_PREBUILT_URL=%GITHUB_WORKSPACE%\dist\bm3dcuda-cpu-win64.zip"
          "%pythonLocation%\python.exe" -m pip uninstall -y vapoursynth-bm3dcuda
          "%pythonLocation%\python.exe" -m pip install --force-reinstall --no-deps --no-build-isolation -v .
          "%pythonLocation%\python.exe" tools\smoke_installed_wheel.py --exercise-cpu-filter

      - name: Upload package directory
        uses: actions/upload-artifact@v4
        with:
          name: bm3dcuda-${{ env.BM3DCUDA_VARIANT }}-package
          path: dist/windows-${{ env.BM3DCUDA_VARIANT }}

      - name: Upload release zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: bm3dcuda-${{ env.BM3DCUDA_VARIANT }}-release-zip
          path: dist/${{ env.BM3DCUDA_ASSET }}

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: bm3dcuda-${{ env.BM3DCUDA_VARIANT }}-wheel-win64
          path: dist/wheels-${{ env.BM3DCUDA_VARIANT }}

      - name: Upload release assets
        if: |
          (startsWith(github.ref, 'refs/tags/') && github.ref_name == env.BM3DCUDA_VARIANT) ||
          (github.event_name == 'release' && github.event.release.tag_name == env.BM3DCUDA_VARIANT) ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.upload_release == 'true')
        shell: powershell
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ env.BM3DCUDA_VARIANT }}
        run: |
          $tag = $env:RELEASE_TAG
          $assets = @("dist\$env:BM3DCUDA_ASSET")
          $assets += Get-ChildItem "dist\wheels-$env:BM3DCUDA_VARIANT\*.whl" | Select-Object -ExpandProperty FullName
          & cmd.exe /d /c "gh release view $tag --repo $env:GITHUB_REPOSITORY >NUL 2>NUL"
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag $assets --clobber --repo $env:GITHUB_REPOSITORY
          } else {
            gh release create $tag $assets --title $tag --notes "Automated BM3DCUDA $env:BM3DCUDA_VARIANT Windows build." --repo $env:GITHUB_REPOSITORY
          }
